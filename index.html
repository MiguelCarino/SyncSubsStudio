<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Studio</title>
    <script src="assets/js/wavesurfer.min.js"></script>
    <style id="mainStyles">
        :root { --bg: #09090b; --panel: #18181b; --border: #27272a; --accent: #10b981; --text: #fafafa; --dim: #71717a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Global Toolbox (Fixed at Top) */
        .global-header { background: #000; border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .kbd-legend { display: flex; gap: 12px; font-size: 10px; color: var(--dim); text-transform: uppercase; }
        kbd { background: #27272a; color: #fff; padding: 2px 4px; border-radius: 3px; font-family: monospace; }

        /* Main Layout */
        .main-container { display: grid; grid-template-columns: 1fr 450px; gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden; }
        .module { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Module Toolbox */
        .module-toolbar { background: #27272a; padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); }
        .module-label { font-size: 10px; font-weight: bold; color: var(--dim); text-transform: uppercase; margin-right: auto; }

        /* Media & Editor */
        #waveform { height: 80px; background: #000; border-bottom: 1px solid var(--border); }
        video { width: 100%; height: auto; background: #000; max-height: 400px; }
        textarea { flex-grow: 1; background: #000; color: #fff; border: none; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; line-height: 1.6; resize: none; }
        .output-text { color: var(--accent); }

        /* Buttons */
        .btn { background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--dim); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="global-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <h1 style="margin:0; font-size: 16px; color: var(--accent);">PRO SYNC STUDIO v4</h1>
            <button class="btn btn-blue" onclick="setupMultiMonitor()">Auto-Assign Monitors</button>
        </div>
        <div class="kbd-legend">
            <span><kbd>ENTER</kbd> Sync</span>
            <span><kbd>B</kbd> Blank</span>
            <span><kbd>S</kbd> Skip</span>
            <span><kbd>SPACE</kbd> Play/Pause</span>
            <span><kbd>J/L</kbd> ±5s</span>
            <span><kbd>CTRL+Z</kbd> Undo</span>
        </div>
    </header>

    <div class="main-container" id="workstation">
        
        <div style="display:flex; flex-direction:column; gap:15px; overflow:hidden;">
            
            <div id="videoModule" class="module">
                <div class="module-toolbar">
                    <span class="module-label">Video Monitor</span>
                    <button class="btn btn-outline" onclick="popOut('videoModule', 1)">Pop-out</button>
                </div>
                <video id="player" controls></video>
                <div id="waveform"></div>
            </div>

            <div id="sourceModule" class="module" style="flex-grow: 1;">
                <div class="module-toolbar">
                    <span class="module-label">Source Script</span>
                    <input type="file" id="mediaInput" class="hidden" accept="video/*,audio/*">
                    <button class="btn" onclick="document.getElementById('mediaInput').click()">Load Media</button>
                    
                    <input type="file" id="subImport" class="hidden" accept=".srt,.lrc,.ass">
                    <button class="btn" onclick="document.getElementById('subImport').click()">Import File</button>
                    
                    <button class="btn btn-outline" onclick="popOut('sourceModule', 2)">Pop-out</button>
                </div>
                <textarea id="sourceText" placeholder="Paste lyrics, SRT, or ASS dialogue here..."></textarea>
            </div>
        </div>

        <div id="outputModule" class="module">
            <div class="module-toolbar">
                <span class="module-label">Sync Output</span>
                <button class="btn btn-outline" onclick="smartStrip()">Strip Timestamps</button>
                <button class="btn" onclick="download('srt')">Export SRT</button>
                <button class="btn" onclick="download('lrc')">Export LRC</button>
            </div>
            <textarea id="outputArea" class="output-text" placeholder="Resulting file..."></textarea>
        </div>

    </div>

<script>
    const player = document.getElementById('player');
    const sourceText = document.getElementById('sourceText');
    const outputArea = document.getElementById('outputArea');
    const styles = document.getElementById('mainStyles').textContent;
    let history = [];

    // --- WAVEFORM ---
    const ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#3f3f46',
        progressColor: '#10b981',
        height: 80,
        media: player
    });

    // --- WINDOW MANAGEMENT (MULTI-MONITOR) ---
    async function setupMultiMonitor() {
        if (!window.getScreenDetails) return alert("Please use Chrome/Edge and enable Window Management permissions.");
        const details = await window.getScreenDetails();
        if (details.screens.length > 1) popOut('videoModule', 1, details.screens[1]);
        if (details.screens.length > 2) popOut('sourceModule', 2, details.screens[2]);
    }

    function popOut(elementId, screenIndex, screenObj = null) {
        const el = document.getElementById(elementId);
        let feats = "width=1200,height=800";
        if (screenObj) feats = `left=${screenObj.availLeft},top=${screenObj.availTop},width=${screenObj.availWidth},height=${screenObj.availHeight}`;
        
        const popup = window.open('', elementId, feats);
        popup.document.head.innerHTML = `<style>${styles}</style>`;
        popup.document.body.appendChild(el);
        popup.onkeydown = (e) => window.onkeydown(e); // Sync keys
        popup.onbeforeunload = () => {
            if (elementId === 'outputModule') document.getElementById('workstation').appendChild(el);
            else document.querySelector('.main-container > div').appendChild(el);
        };
    }

    // --- REFINED STRIPPER (Logic for ASS/SRT/LRC) ---
    function cleanForResync(raw) {
        return raw.split(/\r?\n/).map(line => {
            let l = line.trim();
            if (/^\d+$/.test(l) || l.includes('-->') || l.startsWith('Style:') || l.startsWith('[')) return null;
            if (l.startsWith('Dialogue:')) return l.split(',').slice(9).join(',');
            return l.replace(/^\[\d+:\d+\.\d+\]/, '').trim();
        }).filter(x => x && x.length > 0).join('\n');
    }

    function smartStrip() {
        sourceText.value = cleanForResync(outputArea.value);
        outputArea.value = "";
    }

    // --- CORE ACTIONS ---
    const formatLRC = (s) => `[${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toFixed(2).padStart(5,'0')}]`;

    function syncLine() {
        const lines = sourceText.value.split('\n');
        const current = lines.shift()?.trim();
        if (current === undefined) return;
        const ts = formatLRC(player.currentTime);
        outputArea.value += (outputArea.value ? '\n' : '') + `${ts}${current}`;
        sourceText.value = lines.join('\n');
        outputArea.scrollTop = outputArea.scrollHeight;
        history.push({ type: 'line', text: current });
    }

    function addBlank() {
        const ts = formatLRC(player.currentTime);
        outputArea.value += (outputArea.value ? '\n' : '') + `${ts}`;
        history.push({ type: 'blank' });
    }

    function skipLine() {
        const lines = sourceText.value.split('\n');
        const skipped = lines.shift();
        sourceText.value = lines.join('\n');
        history.push({ type: 'skip', text: skipped });
    }

    function undo() {
        const last = history.pop();
        if (!last) return;
        if (last.type === 'line' || last.type === 'blank') {
            const lines = outputArea.value.trim().split('\n');
            lines.pop();
            outputArea.value = lines.join('\n') + (lines.length ? '\n' : '');
            if (last.type === 'line') sourceText.value = last.text + '\n' + sourceText.value;
        } else if (last.type === 'skip') {
            sourceText.value = last.text + '\n' + sourceText.value;
        }
    }

    // --- EVENT HANDLERS ---
    document.getElementById('mediaInput').onchange = (e) => player.src = URL.createObjectURL(e.target.files[0]);
    document.getElementById('subImport').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const content = ev.target.result;
            if (confirm("Strip timestamps and start clean sync?")) sourceText.value = cleanForResync(content);
            else outputArea.value = content;
        };
        reader.readAsText(e.target.files[0]);
    };

    // --- SHORTCUTS ENGINE ---
    window.onkeydown = (e) => {
        const isEditingOutput = document.activeElement === outputArea;
        const isEditingSource = document.activeElement === sourceText;
        
        // Disable shortcuts if editing output to allow manual typing
        if (isEditingOutput) return;

        // Enter: Sync
        if (e.code === 'Enter') {
            e.preventDefault();
            syncLine();
        }
        // B: Blank
        if (e.code === 'KeyB' && !isEditingSource) {
            e.preventDefault();
            addBlank();
        }
        // S: Skip
        if (e.code === 'KeyS' && !isEditingSource) {
            e.preventDefault();
            skipLine();
        }
        // J/L: Seek
        if (e.code === 'KeyJ' && !isEditingSource) player.currentTime -= 5;
        if (e.code === 'KeyL' && !isEditingSource) player.currentTime += 5;
        // Space: Play/Pause
        if (e.code === 'Space' && !isEditingSource) {
            e.preventDefault();
            player.paused ? player.play() : player.pause();
        }
        // Ctrl+Z: Undo
        if (e.ctrlKey && e.code === 'KeyZ') {
            e.preventDefault();
            undo();
        }
    };

    // --- DOWNLOAD ---
    function download(type) {
        let out = outputArea.value;
        if (type === 'srt') {
            let srt = "";
            const lines = outputArea.value.trim().split('\n');
            lines.forEach((line, i) => {
                const match = line.match(/\[(\d+):(\d+\.\d+)\]/);
                if (!match) return;
                const start = parseInt(match[1])*60 + parseFloat(match[2]);
                const text = line.replace(/\[.*\]/, '').trim();
                let end = start + 2.0;
                if(lines[i+1]) {
                    const nMatch = lines[i+1].match(/\[(\d+):(\d+\.\d+)\]/);
                    if(nMatch) end = Math.min(end, (parseInt(nMatch[1])*60 + parseFloat(nMatch[2])) - 0.05);
                }
                const f = (s) => {
                    const d = new Date(s*1000);
                    const hh = Math.floor(s/3600).toString().padStart(2,'0');
                    const mm = d.getUTCMinutes().toString().padStart(2,'0');
                    const ss = d.getUTCSeconds().toString().padStart(2,'0');
                    const ms = d.getUTCMilliseconds().toString().padStart(3,'0');
                    return `${hh}:${mm}:${ss},${ms}`;
                };
                srt += `${i+1}\n${f(start)} --> ${f(end)}\n${text}\n\n`;
            });
            out = srt;
        }
        const blob = new Blob([out], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `sync_export.${type}`;
        a.click();
    }
</script>
</body>
</html>
